# xml2json-go 配置文件
# 环境变量覆盖: 如 SERVER_PORT=9090 可覆盖 server.port

server:
  host: "0.0.0.0"
  port: 8080
  readTimeout: 30s
  writeTimeout: 30s

# 单管道配置
pipeline:
  id: "default"
  name: "默认转换管道"
  description: "消费XML消息，转为JSON后投递"
  enabled: false      # 启动时是否自动开启管道
  workers: 4          # 转换 worker 协程数
  bufferSize: 1024    # 工作通道缓冲区大小

  # === Kafka 消费端配置 ===
  source:
    brokers:
      - "localhost:9092"
    topics:
      - "input.xml"
    # topicPattern: "xml\..*"   # 也可用正则匹配 topic
    groupId: "xml2json-group"
    autoOffsetReset: "latest"   # earliest | latest
    enableAutoCommit: true
    commitInterval: 5s
    sessionTimeout: 10s
    heartbeatInterval: 3s
    maxPollRecords: 500
    fetchMinBytes: 1
    fetchMaxBytes: 10485760    # 10MB
    fetchMaxWait: 5s

  # === XML→JSON 转换配置 ===
  transform:
    attributePrefix: "@"       # XML 属性前缀
    textKey: "#text"            # XML 文本节点 key
    cdataKey: "#cdata"         # CDATA 节点 key
    namespaceMode: "strip"     # keep | strip | expand
    trimElements: true
    skipComments: true
    skipProcInst: true
    strictMode: false          # 严格模式: XML 格式错误时丢弃消息
    errorTopic: ""             # 错误消息投递 topic（空=不投递）

  # === Kafka 生产端配置 ===
  sink:
    brokers:
      - "localhost:9092"
    topic: "output.json"
    acks: 1                   # 0=不等待 | 1=Leader确认 | -1=所有副本确认
    compression: "none"        # none | gzip | snappy | lz4 | zstd
    batchSize: 16384           # 批量发送字节数
    lingerMs: 10               # 批量等待时间(ms)
    maxInFlightRequests: 5
    idempotent: false
    maxRetries: 3
    retryBackoff: 100ms
    partitioner: "hash"        # hash | roundRobin | random
    partitionKeyField: ""      # JSON中用作分区 key 的字段路径
