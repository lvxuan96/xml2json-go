server:
    host: 0.0.0.0
    port: 8080
    readTimeout: 30s
    writeTimeout: 30s
pipelines:
    - id: order-pipeline
      name: 测试数据转换
      description: 消费订单XML，转为JSON输出
      enabled: false
      workers: 4
      bufferSize: 1024
      source:
        brokers: ['localhost:9092']
        topics: [test-xml]
        topicPattern: ""
        groupId: xml2json-order-group
        autoOffsetReset: earliest
        enableAutoCommit: true
        commitInterval: 5s
        sessionTimeout: 10s
        heartbeatInterval: 3s
        maxPollRecords: 500
        fetchMinBytes: 0
        fetchMaxBytes: 0
        fetchMaxWait: 0s
        sasl: null
        tls: null
      transform:
        attributePrefix: '@'
        textKey: '#text'
        cdataKey: ""
        namespaceMode: strip
        trimElements: true
        skipComments: true
        skipProcInst: true
        strictMode: false
        errorTopic: ""
        stripLevels: 2
      sink:
        brokers: ['localhost:9092']
        topic: test-json
        acks: 1
        compression: none
        batchSize: 16384
        lingerMs: 10
        maxInFlightRequests: 5
        idempotent: false
        maxRetries: 3
        retryBackoff: 100ms
        partitioner: hash
        partitionKeyField: ""
        sasl: null
        tls: null
    - id: user-pipeline
      name: 用户数据转换
      description: 消费用户XML，转为JSON输出
      enabled: false
      workers: 4
      bufferSize: 1024
      source:
        brokers: ['localhost:9092']
        topics: [user-xml]
        topicPattern: ""
        groupId: xml2json-user-group
        autoOffsetReset: latest
        enableAutoCommit: true
        commitInterval: 5s
        sessionTimeout: 10s
        heartbeatInterval: 3s
        maxPollRecords: 500
        fetchMinBytes: 0
        fetchMaxBytes: 0
        fetchMaxWait: 0s
        sasl: null
        tls: null
      transform:
        attributePrefix: '@'
        textKey: '#text'
        cdataKey: ""
        namespaceMode: strip
        trimElements: false
        skipComments: false
        skipProcInst: false
        strictMode: false
        errorTopic: ""
        stripLevels: 0
      sink:
        brokers: ['localhost:9092']
        topic: user-json
        acks: 1
        compression: zstd
        batchSize: 0
        lingerMs: 0
        maxInFlightRequests: 0
        idempotent: false
        maxRetries: 0
        retryBackoff: 0s
        partitioner: ""
        partitionKeyField: ""
        sasl: null
        tls: null
